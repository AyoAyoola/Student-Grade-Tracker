<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Grade Tracker</h1>
            <p>Manage and track student performance effortlessly.</p>
        </header>

        <main>
            <section class="card input-section">
                <h2>Add New Student</h2>
                <form id="student-form">
                    <div class="form-group">
                        <label for="student-name">Student Name</label>
                        <input type="text" id="student-name" placeholder="Enter full name" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="student-grade">Grade (0-100)</label>
                        <input type="number" id="student-grade" placeholder="Enter grade" min="0" max="100">
                    </div>
                    <button type="submit" class="btn-primary">Add Student</button>
                    <div id="error-message" class="error-message"></div>
                </form>
            </section>

            <section class="card stats-section">
                <h2>Average Grade</h2>
                <div class="average-display">
                    <span id="average-value">0.0</span>
                    <span class="average-label">/ 100</span>
                </div>
            </section>

            <section class="card list-section">
                <div class="list-header">
                    <h2>Student List</h2>
                    <span class="badge" id="student-count">0 Students</span>
                </div>
                <div class="table-container">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Grade</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body">
                            <!-- Student rows will be injected here dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
